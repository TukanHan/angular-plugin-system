<ng-container libPluginSlot [slotName]="'invoices-list'" />

<div class="flex justify-content-between align-items-center mb-4">
    <h1 class="m-0 text-2xl font-semibold">Lista Faktur</h1>
    <p-button
        label="Wystaw fakturę"
        icon="pi pi-plus"
        routerLink="/invoices/form"
    />
</div>

<p-card styleClass="shadow-2">
    <p-table
        #dt
        [value]="invoices()"
        [rows]="10"
        [paginator]="true"
        [globalFilterFields]="['number', 'client']"
        responsiveLayout="stack"
        [breakpoint]="'960px'"
        styleClass="p-datatable-sm"
    >
        <ng-template pTemplate="caption">
            <div class="flex justify-content-end">
                <p-iconField iconPosition="left">
                    <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
                    <input
                        pInputText
                        type="text"
                        (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                        placeholder="Szukaj faktury..."
                    />
                </p-iconField>
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="number">
                    Numer <p-sortIcon field="number"></p-sortIcon>
                </th>
                <th pSortableColumn="client">
                    Kontrahent <p-sortIcon field="client"></p-sortIcon>
                </th>
                <th pSortableColumn="date">
                    Data <p-sortIcon field="date"></p-sortIcon>
                </th>
                <th pSortableColumn="amount">
                    Kwota <p-sortIcon field="amount"></p-sortIcon>
                </th>
                <th>Status</th>
                <th style="width: 5rem"></th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-invoice>
            <tr>
                <td>{{ invoice.number }}</td>
                <td>{{ invoice.client }}</td>
                <td>{{ invoice.date }}</td>
                <td>{{ invoice.amount | currency: 'PLN' }}</td>
                <td>
                    <p-tag
                        [value]="getStatusLabel(invoice.status)"
                        [severity]="getSeverity(invoice.status)"
                    />
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button
                            icon="pi pi-eye"
                            [text]="true"
                            severity="secondary"
                        ></p-button>
                        <p-button
                            icon="pi pi-trash"
                            [text]="true"
                            severity="danger"
                        ></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center p-4">
                    Nie znaleziono żadnych faktur.
                </td>
            </tr>
        </ng-template>
    </p-table>
</p-card>

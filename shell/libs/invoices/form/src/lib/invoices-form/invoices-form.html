<ng-container *libPluginSlot="'invoice-form'" />

<div class="flex justify-content-between align-items-center mb-4">
    <h1 class="m-0 text-2xl font-semibold">Nowa Faktura</h1>
    <div class="flex gap-2">
        <p-button
            label="Anuluj"
            severity="secondary"
            [outlined]="true"
            icon="pi pi-times"
        ></p-button>
        <p-button
            label="Zapisz Fakturę"
            icon="pi pi-check"
            (onClick)="saveInvoice()"
        ></p-button>
    </div>
</div>

<div class="grid">
    <div class="col-12 lg:col-6">
        <p-card header="Informacje o dokumencie" styleClass="h-full shadow-2">
            <div class="flex flex-column gap-4 py-2">
                <p-floatLabel>
                    <input
                        pInputText
                        id="inv_num"
                        [ngModel]="invoice().number"
                        (ngModelChange)="invoice.update(v => ({...v, number: $event}))"
                        class="w-full"
                    />
                    <label for="inv_num">Numer dokumentu</label>
                </p-floatLabel>

                <div class="flex gap-3">
                    <p-floatLabel class="flex-1">
                        <p-datepicker
                            id="inv_date"
                            [ngModel]="invoice().date"
                            (ngModelChange)="invoice.update(v => ({...v, date: $event}))"
                            class="w-full"
                            [showIcon]="true"
                            appendTo="body"
                        ></p-datepicker>
                        <label for="inv_date">Data wystawienia</label>
                    </p-floatLabel>

                    <p-floatLabel class="flex-1">
                        <p-datepicker
                            id="due_date"
                            [ngModel]="invoice().dueDate"
                            (ngModelChange)="invoice.update(v => ({...v, dueDate: $event}))"
                            class="w-full"
                            [showIcon]="true"
                            appendTo="body"
                        ></p-datepicker>
                        <label for="due_date">Termin płatności</label>
                    </p-floatLabel>
                </div>
            </div>
        </p-card>
    </div>

    <div class="col-12 lg:col-6">
        <p-card header="Dane nabywcy" styleClass="h-full shadow-2">
            <div class="flex flex-column gap-4 py-2">
                <p-floatLabel>
                    <input
                        pInputText
                        id="client"
                        [ngModel]="invoice().client"
                        (ngModelChange)="invoice.update(v => ({...v, client: $event}))"
                        class="w-full"
                    />
                    <label for="client">Nazwa firmy / Imię i nazwisko</label>
                </p-floatLabel>

                <p-floatLabel>
                    <input
                        pInputText
                        id="tax_id"
                        [ngModel]="invoice().taxId"
                        (ngModelChange)="invoice.update(v => ({...v, taxId: $event}))"
                        class="w-full"
                    />
                    <label for="tax_id">NIP / Tax ID</label>
                </p-floatLabel>
            </div>
        </p-card>
    </div>

    <div class="col-12">
        <p-card header="Podsumowanie finansowe" styleClass="shadow-2">
            <div class="grid align-items-center">
                <div class="col-12 lg:col-4">
                    <p-floatLabel>
                        <p-inputNumber
                            id="amount"
                            [ngModel]="invoice().amount"
                            (ngModelChange)="invoice.update(v => ({...v, amount: $event}))"
                            mode="currency"
                            [currency]="invoice().currency"
                            locale="pl-PL"
                            class="w-full"
                            inputStyleClass="w-full"
                        >
                        </p-inputNumber>
                        <label for="amount">Kwota Netto</label>
                    </p-floatLabel>
                </div>

                <div class="col-12 lg:col-2">
                    <p-select
                        [options]="currencies"
                        [ngModel]="invoice().currency"
                        (ngModelChange)="invoice.update(v => ({...v, currency: $event}))"
                        class="w-full"
                        placeholder="Waluta"
                    ></p-select>
                </div>

                <div class="col-12 lg:col-6 text-right">
                    <div class="text-600 font-medium">
                        Suma Brutto (estymowana 23% VAT):
                    </div>
                    <div class="text-3xl font-bold text-primary">
                        {{ totalBrutto() | currency: invoice().currency }}
                    </div>
                </div>
            </div>
        </p-card>
    </div>
</div>

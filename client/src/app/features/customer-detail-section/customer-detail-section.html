<p-card header="Szczegółowe dane kontrahenta" styleClass="shadow-2 h-full">
    <p-fluid>
        <div class="grid p-fluid">
            <div class="col-12 md:col-6 mb-4">
                <p-floatLabel>
                    <input
                        pInputText
                        id="clientName"
                        [formField]="invoiceForm.name"
                    />
                    <label for="clientName">Pełna nazwa kontrahenta</label>
                </p-floatLabel>
            </div>

            <div class="col-12 md:col-3 mb-4">
                <p-checkbox inputId="vat-payer" [formField]="invoiceForm.vatPayer" [binary]="true"/>
                <label for="vat-payer">Płatwnik Vat</label>
            </div>

            <div class="col-12 md:col-3 mb-4">
                <p-floatLabel>
                    <p-select
                        id="type"
                        [options]="clientTypes"
                        optionLabel="label"
                        optionValue="value"
                        [formField]="$any(invoiceForm.type)"
                    />
                    <label for="type">Typ</label>
                </p-floatLabel>
            </div>
        </div>
    </p-fluid>
</p-card>
